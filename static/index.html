<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama boilerplate</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <h1>Ollama boilerplate</h1>

  <!-- This is where the messages will appear -->
  <div id="chat"></div>

  <!-- The form to type and send a message -->
  <form id="form">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <!-- Scripts are split into small files for readability -->
  <script src="/static/scripts/chat.js"></script>
  <script src="/static/scripts/api.js"></script>
  <script src="/static/scripts/main.js"></script>
</body>
</html>
